<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 1060" width="1120" height="1060" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="call" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L11,6 L0,12 z" fill="#c7d0ee"/>
    </marker>
    <marker id="ret" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#93a0c4" stroke-width="1.3" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1120" height="1060" fill="#0b1020"/>
  <rect x="14" y="14" width="1092" height="1032" rx="16" fill="#0e1733" stroke="#283358" stroke-width="1"/>

  <text x="40" y="56" font-size="26" font-weight="700" fill="#e8ecf8">Workflow (sequence) — resilient research task</text>
  <text x="40" y="82" font-size="14" fill="#93a0c4">The recommended design: transient failures are recovered inside the subagent; only unresolvable ones escalate — with context.</text>

  <!-- legend -->
  <g font-size="12" fill="#93a0c4">
    <line x1="720" y1="52" x2="770" y2="52" stroke="#c7d0ee" stroke-width="1.6" marker-end="url(#call)"/>
    <text x="778" y="56">call</text>
    <line x1="830" y1="52" x2="880" y2="52" stroke="#93a0c4" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ret)"/>
    <text x="888" y="56">return / throw</text>
  </g>

  <!-- lifeline x positions: demo=120  coordinator=360  subagent=640  parser=940 -->
  <!-- participant headers -->
  <g>
    <rect x="40" y="104" width="160" height="40" rx="6" fill="#243056" stroke="#6ea8ff"/>
    <text x="120" y="130" font-size="15" font-weight="700" fill="#e8ecf8" text-anchor="middle">demo.js</text>
    <rect x="280" y="104" width="160" height="40" rx="6" fill="#243056" stroke="#6ea8ff"/>
    <text x="360" y="130" font-size="15" font-weight="700" fill="#e8ecf8" text-anchor="middle">Coordinator</text>
    <rect x="560" y="104" width="160" height="40" rx="6" fill="#1f3a2e" stroke="#46d39a"/>
    <text x="640" y="130" font-size="15" font-weight="700" fill="#e8ecf8" text-anchor="middle">Subagent (resilient)</text>
    <rect x="860" y="104" width="160" height="40" rx="6" fill="#1a2240" stroke="#93a0c4"/>
    <text x="940" y="130" font-size="15" font-weight="700" fill="#e8ecf8" text-anchor="middle">PdfParser</text>
  </g>

  <!-- lifelines -->
  <line x1="120" y1="144" x2="120" y2="1000" stroke="#283358" stroke-dasharray="4 5"/>
  <line x1="360" y1="144" x2="360" y2="1000" stroke="#283358" stroke-dasharray="4 5"/>
  <line x1="640" y1="144" x2="640" y2="1000" stroke="#283358" stroke-dasharray="4 5"/>
  <line x1="940" y1="144" x2="940" y2="1000" stroke="#283358" stroke-dasharray="4 5"/>

  <!-- 1: runResearchTask -->
  <line x1="120" y1="180" x2="356" y2="180" stroke="#c7d0ee" stroke-width="1.6" marker-end="url(#call)"/>
  <text x="138" y="172" font-size="13" fill="#e8ecf8">1: runResearchTask(corpus)</text>

  <!-- loop frame -->
  <rect x="60" y="196" width="980" height="700" rx="6" fill="none" stroke="#6ea8ff" stroke-width="1" stroke-dasharray="2 4"/>
  <rect x="60" y="196" width="120" height="22" fill="#6ea8ff"/>
  <text x="70" y="212" font-size="12" font-weight="700" fill="#06122c">loop [each doc]</text>

  <!-- 2: process(document) -->
  <line x1="360" y1="244" x2="636" y2="244" stroke="#c7d0ee" stroke-width="1.6" marker-end="url(#call)"/>
  <text x="378" y="236" font-size="13" fill="#e8ecf8">2: process(document)</text>

  <!-- 3: parseSection -->
  <line x1="640" y1="290" x2="936" y2="290" stroke="#c7d0ee" stroke-width="1.6" marker-end="url(#call)"/>
  <text x="658" y="282" font-size="13" fill="#e8ecf8">3: parseSection(doc, section, { timeoutMs: 50 })</text>

  <!-- alt frame -->
  <rect x="500" y="312" width="540" height="470" rx="6" fill="none" stroke="#93a0c4" stroke-width="1" stroke-dasharray="2 4"/>
  <rect x="500" y="312" width="92" height="22" fill="#93a0c4"/>
  <text x="510" y="328" font-size="12" font-weight="700" fill="#0b1020">alt [failure]</text>

  <!-- 4a clean -->
  <line x1="940" y1="356" x2="644" y2="356" stroke="#46d39a" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ret)"/>
  <text x="660" y="348" font-size="12" fill="#46d39a">4a · clean → { id, text }</text>

  <!-- 4b corrupted -->
  <line x1="940" y1="398" x2="644" y2="398" stroke="#ffcf5c" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ret)"/>
  <text x="660" y="390" font-size="12" fill="#ffcf5c">4b · throw CorruptedSectionError</text>
  <rect x="560" y="412" width="240" height="34" rx="6" fill="#1f3a2e" stroke="#46d39a"/>
  <text x="680" y="434" font-size="12" fill="#46d39a" text-anchor="middle">LOCAL: skip section, warn, status→partial</text>

  <!-- 4c timeout -->
  <line x1="940" y1="478" x2="644" y2="478" stroke="#ffcf5c" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ret)"/>
  <text x="660" y="470" font-size="12" fill="#ffcf5c">4c · throw ParseTimeoutError</text>
  <line x1="640" y1="514" x2="936" y2="514" stroke="#c7d0ee" stroke-width="1.6" marker-end="url(#call)"/>
  <text x="658" y="506" font-size="13" fill="#e8ecf8">4c.1 retry: parseSection({ timeoutMs: 130 })</text>
  <line x1="940" y1="548" x2="644" y2="548" stroke="#46d39a" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ret)"/>
  <text x="660" y="540" font-size="12" fill="#46d39a">ok on retry</text>
  <rect x="560" y="562" width="240" height="34" rx="6" fill="#1f3a2e" stroke="#46d39a"/>
  <text x="680" y="584" font-size="12" fill="#46d39a" text-anchor="middle">LOCAL: bounded retry (≤3), widen budget</text>

  <!-- 4d password (hard) -->
  <line x1="940" y1="628" x2="644" y2="628" stroke="#ff6b6b" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ret)"/>
  <text x="660" y="620" font-size="12" fill="#ff6b6b">4d · throw PasswordProtectedError</text>
  <rect x="560" y="642" width="240" height="34" rx="6" fill="#3a2230" stroke="#ff6b6b"/>
  <text x="680" y="664" font-size="12" fill="#ff6b6b" text-anchor="middle">HARD: cannot resolve → escalate</text>
  <rect x="560" y="690" width="240" height="74" rx="6" fill="#0d1a33" stroke="#ff6b6b" stroke-dasharray="4 4"/>
  <text x="680" y="712" font-size="12" fill="#cdd5ee" text-anchor="middle">return { status:"failed",</text>
  <text x="680" y="730" font-size="12" fill="#cdd5ee" text-anchor="middle"> error, partial, attempts }</text>
  <text x="680" y="752" font-size="11" fill="#93a0c4" text-anchor="middle">(structured context, not a bare throw)</text>

  <!-- end alt -->
  <text x="500" y="800" font-size="11" fill="#93a0c4">▼ end alt</text>

  <!-- 5: Result back to coordinator -->
  <line x1="640" y1="828" x2="364" y2="828" stroke="#93a0c4" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ret)"/>
  <text x="380" y="820" font-size="12" fill="#e8ecf8">5: Result { status, extracted, partial, attempts, error? }</text>

  <!-- coordinator decision note -->
  <rect x="250" y="852" width="290" height="40" rx="6" fill="#243056" stroke="#6ea8ff"/>
  <text x="395" y="868" font-size="12" fill="#cdd5ee" text-anchor="middle">success / partial → just aggregate</text>
  <text x="395" y="884" font-size="12" fill="#ff6b6b" text-anchor="middle">failed → triage (intervention++)</text>

  <!-- end loop -->
  <text x="60" y="916" font-size="11" fill="#6ea8ff">▼ end loop</text>

  <!-- 6: Report back to demo -->
  <line x1="360" y1="948" x2="124" y2="948" stroke="#93a0c4" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#ret)"/>
  <text x="140" y="940" font-size="12" fill="#e8ecf8">6: Report { results, coordinatorInterventions, log }</text>

  <!-- footer caption -->
  <text x="40" y="1000" font-size="13" fill="#93a0c4">Net effect: the coordinator only ever acts on step 5 when status = "failed". Everything else is handled inside the subagent.</text>
</svg>
